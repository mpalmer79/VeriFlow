<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Logomark + chain motif</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0b1220;color:#e6edf3;font-family:Inter,sans-serif}
  .wrap{padding:20px;display:flex;align-items:center;gap:40px;height:calc(100% - 40px)}
  .mark{display:flex;align-items:center;gap:10px}
  .mark svg{width:32px;height:32px}
  .wordmark{font-family:"Fraunces",serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
  .chain{flex:1;display:flex;justify-content:center}
  @keyframes pulse {0%{opacity:.25}50%{opacity:.75}100%{opacity:.25}}
  .link{animation:pulse 2.1s ease-in-out infinite}
  .link:nth-child(2){animation-delay:.42s}
  .link:nth-child(3){animation-delay:.84s}
  .link:nth-child(4){animation-delay:1.26s}
  .link:nth-child(5){animation-delay:1.68s}
</style></head>
<body><div class="wrap">
  <div class="mark">
    <svg viewBox="0 0 32 32" fill="none" stroke="#3dabc4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 9 L14 24 L16 21"/><path d="M12 9 L21 24 L27 13"/>
    </svg>
    <span class="wordmark">VeriFlow</span>
  </div>
  <div class="chain">
    <svg width="260" height="18" viewBox="0 0 260 18" fill="none" stroke="#3dabc4" stroke-width="1.25" stroke-linecap="round">
      <ellipse class="link" cx="25" cy="9" rx="22" ry="7.5"/>
      <ellipse class="link" cx="75" cy="9" rx="22" ry="7.5"/>
      <ellipse class="link" cx="125" cy="9" rx="22" ry="7.5"/>
      <ellipse class="link" cx="175" cy="9" rx="22" ry="7.5"/>
      <ellipse class="link" cx="225" cy="9" rx="22" ry="7.5"/>
    </svg>
  </div>
</div></body></html>
