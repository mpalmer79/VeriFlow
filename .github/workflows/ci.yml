name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-sqlite:
    name: backend (sqlite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (in-memory SQLite)
        env:
          APP_ENV: test
          JWT_SECRET: ci-sqlite-secret
        run: pytest -q

      - name: Verify Alembic baseline applies cleanly
        env:
          APP_ENV: test
          JWT_SECRET: ci-sqlite-secret
          DATABASE_URL: sqlite+pysqlite:///./_ci_alembic.db
        run: |
          alembic upgrade head
          alembic current
          rm -f ./_ci_alembic.db

  backend-postgres:
    name: backend (postgresql)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veriflow
          POSTGRES_PASSWORD: veriflow
          POSTGRES_DB: veriflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veriflow -d veriflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply Alembic migrations
        env:
          APP_ENV: test
          JWT_SECRET: ci-postgres-secret
          DATABASE_URL: postgresql+psycopg2://veriflow:veriflow@localhost:5432/veriflow
        run: alembic upgrade head

      - name: Run pytest against PostgreSQL
        env:
          APP_ENV: test
          JWT_SECRET: ci-postgres-secret
          TEST_DATABASE_URL: postgresql+psycopg2://veriflow:veriflow@localhost:5432/veriflow
        run: pytest -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
