name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-sqlite:
    # Broad, fast feedback loop. Runs the full suite against in-memory
    # SQLite; the `postgres`-marked subset is the dialect-sensitive
    # confidence layer that the dedicated PostgreSQL job covers, so we
    # skip it here to avoid paying for the same assertions twice.
    name: backend (sqlite, broad)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (SQLite, broad suite)
        env:
          APP_ENV: test
          JWT_SECRET: ci-sqlite-secret
        run: pytest -q -m "not postgres"

  backend-postgres:
    # Narrow, dialect-specific confidence. Runs only:
    #   - tests marked `postgres` (partial unique indexes on nullable
    #     columns, native enum surface, IntegrityError via psycopg2)
    #   - tests marked `migration` (Alembic baseline inspection)
    # plus a real `alembic upgrade head` + `downgrade base` +
    # `upgrade head` cycle against PostgreSQL to catch migration
    # regressions that SQLite would hide.
    name: backend (postgres, targeted)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veriflow
          POSTGRES_PASSWORD: veriflow
          POSTGRES_DB: veriflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veriflow -d veriflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      JWT_SECRET: ci-postgres-secret
      DATABASE_URL: postgresql+psycopg2://veriflow:veriflow@localhost:5432/veriflow
      TEST_DATABASE_URL: postgresql+psycopg2://veriflow:veriflow@localhost:5432/veriflow
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Alembic upgrade/downgrade round-trip
        run: |
          alembic upgrade head
          alembic current
          alembic downgrade base
          alembic upgrade head

      - name: Run pytest (PostgreSQL, targeted subset)
        run: pytest -q -m "postgres or migration"

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  e2e:
    # Browser smoke. Chromium only, single worker, no retries. Runs the
    # small Playwright suite that covers auth/shell, records list ->
    # detail + metadata-only gating, the confirm-dialog flow, the
    # operations admin surface, and the typography/motion wiring.
    # Scoped to PRs (and main) because it requires a real stack; the
    # job self-hosts backend+frontend in background processes.
    name: e2e (playwright, chromium)
    runs-on: ubuntu-latest
    needs: [backend-sqlite, frontend]
    env:
      APP_ENV: development
      JWT_SECRET: ci-e2e-secret
      DATABASE_URL: sqlite+pysqlite:///./_ci_e2e.db
      EVIDENCE_STORAGE_DIR: ./_ci_e2e_evidence
      CORS_ORIGINS: http://localhost:3000
      VERIFLOW_ALLOW_SEED: "true"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Apply migrations and seed
        working-directory: backend
        run: |
          alembic upgrade head
          python -m app.seed.seed_data

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health/readiness >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become ready" >&2
          tail -n 200 backend.log >&2 || true
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npx next start -p 3000 > frontend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to become ready" >&2
          tail -n 200 frontend.log >&2 || true
          exit 1

      - name: Run Playwright
        working-directory: frontend
        run: npx playwright test --workers=1

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/test-results
          if-no-files-found: ignore
