<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · Surfaces</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; background:#0b1220; color:#e6edf3; font-family:Inter,system-ui,sans-serif; }
  .wrap { padding:20px; display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .row { display:flex; gap:12px; align-items:center; padding:14px 16px; border:1px solid #1f2a44; border-radius:8px; }
  .chip { width:44px; height:44px; border-radius:6px; border:1px solid #1f2a44; flex-shrink:0; }
  .name { font-weight:600; font-size:13px; }
  .hex { font-family:"JetBrains Mono",monospace; font-size:12px; color:#94a3b8; margin-top:2px; }
  .desc { font-size:12px; color:#64748b; margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row" style="background:#0b1220"><div class="chip" style="background:#0b1220"></div><div><div class="name">surface</div><div class="hex">#0b1220</div><div class="desc">page background</div></div></div>
  <div class="row" style="background:#0f172a"><div class="chip" style="background:#0f172a"></div><div><div class="name">surface.panel</div><div class="hex">#0f172a</div><div class="desc">elevated · cards</div></div></div>
  <div class="row" style="background:#111c33"><div class="chip" style="background:#111c33"></div><div><div class="name">surface.muted</div><div class="hex">#111c33</div><div class="desc">sunken · nested</div></div></div>
  <div class="row" style="background:#0f172a"><div class="chip" style="background:#1f2a44"></div><div><div class="name">surface.border</div><div class="hex">#1f2a44</div><div class="desc">hairline border</div></div></div>
</div>
</body>
</html>
