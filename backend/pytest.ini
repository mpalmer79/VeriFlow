[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    postgres: test relies on PostgreSQL-specific schema semantics (partial
        unique indexes on nullable columns, native enum types, integrity
        errors surfaced via the psycopg2 dialect). Runs on both backends
        locally; CI gives these a dedicated PostgreSQL job.
    migration: test inspects or exercises the Alembic baseline / migration
        files. Small, fast; paired with `postgres` in the PostgreSQL CI job
        to verify migrations against a real database.
