# Alembic configuration for VeriFlow.
# The actual database URL is pulled from `app.core.config.Settings.database_url`
# by migrations/env.py, so `sqlalchemy.url` here is an intentional placeholder
# used only when invoking Alembic without the VeriFlow app context.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC
sqlalchemy.url = sqlite+pysqlite:///./veriflow.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
